<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reverse-perspective</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="loading">
    <span class="loading-dot"></span>
  </div>

  <main id="app" hidden>
    <article class="paper">

      <header class="paper-header">
        <div class="header-left">
          <h1 id="repo-name"></h1>
          <a id="repo-url" class="repo-url" target="_blank" rel="noopener"></a>
        </div>
        <div class="header-right" id="repo-stats"></div>
      </header>

      <hr />

      <section class="paper-section">
        <div class="section-label">Overview</div>
        <p id="overview"></p>
      </section>

      <hr />

      <div class="paper-grid">
        <section class="paper-section">
          <div class="section-label">Architecture</div>
          <div id="architecture"></div>
        </section>
        <section class="paper-section">
          <div class="section-label">End-to-End Flow</div>
          <pre id="flow"></pre>
        </section>
      </div>

      <hr />

      <section class="paper-section">
        <div class="section-label">How I'd Rebuild This</div>
        <ol id="reconstruction"></ol>
      </section>

      <hr />

      <section class="paper-section">
        <div class="section-label">Design Decisions</div>
        <ul id="decisions"></ul>
      </section>

    </article>
  </main>

  <div class="toolbar">
    <div class="export-wrap">
      <button id="export-btn">export</button>
      <div class="export-menu" id="export-menu">
        <button data-format="pdf">PDF</button>
        <button data-format="docx">DOCX</button>
        <button data-format="md">Markdown</button>
      </div>
    </div>
    <button id="dark-toggle">dark</button>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
